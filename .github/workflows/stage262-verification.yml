name: stage262-verification

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-stage262:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography

      - name: Run Stage262 demo
        run: |
          chmod +x tools/run_stage262_demo.sh
          ./tools/run_stage262_demo.sh
