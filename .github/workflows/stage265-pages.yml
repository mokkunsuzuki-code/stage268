name: stage265-pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "stage265-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install OpenTimestamps client
        run: |
          python -m pip install --upgrade pip
          python -m pip install opentimestamps-client

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Run Stage265 public verification flow
        run: |
          chmod +x tools/run_stage265_public_verification.sh
          ./tools/run_stage265_public_verification.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
