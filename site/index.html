<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stage268 Verification Score</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 960px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
      color: #111;
    }
    h1, h2 { margin-bottom: 0.4em; }
    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
      background: #fafafa;
    }
    .score {
      font-size: 2rem;
      font-weight: 700;
    }
    code, pre {
      background: #f4f4f4;
      border-radius: 8px;
    }
    pre {
      padding: 16px;
      overflow-x: auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
  </style>
</head>
<body>
  <h1>Stage268 Verification Score</h1>
  <p>
    This page publishes the Stage268 trust evaluation result.
  </p>
  <p>
    Total Trust = Time × Integrity × Execution × Identity
  </p>

  <div class="card">
    <div>Total Trust</div>
    <div id="total" class="score">loading...</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Time Trust</h2>
      <div id="time">loading...</div>
    </div>
    <div class="card">
      <h2>Integrity Trust</h2>
      <div id="integrity">loading...</div>
    </div>
    <div class="card">
      <h2>Execution Trust</h2>
      <div id="execution">loading...</div>
    </div>
    <div class="card">
      <h2>Identity Trust</h2>
      <div id="identity">loading...</div>
    </div>
  </div>

  <div class="card">
    <h2>Raw JSON</h2>
    <pre id="raw">loading...</pre>
  </div>

  <script>
    fetch('./verification_score.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('total').textContent = data.total_trust;
        document.getElementById('time').textContent =
          `${data.components.time_trust.score} (${data.components.time_trust.status})`;
        document.getElementById('integrity').textContent =
          `${data.components.integrity_trust.score} (${data.components.integrity_trust.status})`;
        document.getElementById('execution').textContent =
          `${data.components.execution_trust.score} (${data.components.execution_trust.status})`;
        document.getElementById('identity').textContent =
          `${data.components.identity_trust.score} (${data.components.identity_trust.status})`;
        document.getElementById('raw').textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById('total').textContent = 'failed';
        document.getElementById('raw').textContent = String(err);
      });
  </script>
</body>
</html>
